server:
  port: ${PORT:8083}
  servlet:
    context-path: /

spring:
  application:
    name: progress-service

  # ─── DataSource ─────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:aws-1-ap-southeast-2.pooler.supabase.com}:${POSTGRES_PORT:5432}/${POSTGRES_DB:postgres}
    username: ${POSTGRES_USER:postgres.diculkpsidcofmbyeqdq}
    password: ${POSTGRES_PASSWORD:#Devmastery@098}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ContentServicePool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ─── JPA / Hibernate ────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages DDL — Hibernate only validates
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
    open-in-view: false           # Never use OSIV — explicit service boundaries

  # ─── Flyway ─────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: false
    out-of-order: false
    ignore-missing-migrations: true

  # ─── Cache (Valkey — drop-in Redis replacement) ─────────────
  cache:
    type: redis
  data:
    redis:
      host: ${VALKEY_HOST:localhost}
      port: ${VALKEY_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # ─── Kafka ──────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # ─── Jackson ────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ─── Cache TTL Configuration (matches spec) ─────────────────
devmastery:
  cache:
    topics-ttl-hours: 24          # devmastery:content:topics
    lesson-ttl-hours: 6           # devmastery:content:lesson:{id}
    search-popular-ttl-hours: 1   # devmastery:search:popular
  security:
    jwt-secret: ${JWT_SECRET:devmastery_dev_jwt_secret_change_in_prod_min_32_chars}

# ─── App JWT (used by JwtTokenProvider) ─────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:devmastery_dev_jwt_secret_change_in_prod_min_32_chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# ─── SpringDoc OpenAPI ───────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
  info:
    title: DevMastery Content Service
    description: "Learning paths, topics, lessons, and code examples API"
    version: "1.0.0"

# ─── Actuator ───────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# ─── Logging ────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.devmastery: DEBUG
    org.springframework.cache: DEBUG       # show cache hits/misses
    org.hibernate.SQL: WARN               # suppress SQL in prod
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ─── Gamification (Phase 7) ──────────────────────────────────
xp:
  level-multipliers:
    "1": 10
    "2": 20
    "3": 35
    "4": 50
    "5": 75

streak:
  freeze-count-default: 1
  monthly-freeze-refill: true

---
# ─── Dev Profile Overrides ──────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
