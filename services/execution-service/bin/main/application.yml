server:
  port: ${PORT:8085}
  servlet:
    context-path: /

spring:
  application:
    name: execution-service

  # ─── Cache (Valkey / Redis — optional in dev) ─────────────────
  cache:
    type: none  # Set to 'redis' in prod when Valkey is available

  # ─── Jackson ──────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ─── Judge0 Configuration ─────────────────────────────────────
judge0:
  url: ${JUDGE0_URL:http://localhost:2358}

# ─── Security ─────────────────────────────────────────────────
devmastery:
  security:
    jwt-secret: ${JWT_SECRET:devmastery_dev_jwt_secret_change_in_prod_min_32_chars}

# ─── SpringDoc OpenAPI ────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ─── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ─── Logging ──────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.devmastery: DEBUG
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{30} - %msg%n"

---
# ─── Dev Profile ──────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.devmastery: DEBUG
