server:
  port: ${PORT:8081}
  servlet:
    context-path: /

spring:
  application:
    name: auth-service   # was incorrectly set to 'content-service'

  # ─── DataSource ─────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:aws-1-ap-southeast-2.pooler.supabase.com}:${POSTGRES_PORT:5432}/${POSTGRES_DB:postgres}
    username: ${POSTGRES_USER:postgres.diculkpsidcofmbyeqdq}
    password: ${POSTGRES_PASSWORD:#Devmastery@098}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AuthServicePool
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ─── JPA / Hibernate ────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
    open-in-view: false

  # ─── Flyway ─────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  # ─── Jackson ────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ─── DevMastery Security ─────────────────────────────────────────
# IMPORTANT: app.jwt.secret is read by JwtTokenProvider.java
# Other services read devmastery.security.jwt-secret — they MUST match
devmastery:
  security:
    jwt-secret: ${JWT_SECRET:devmastery_dev_jwt_secret_change_in_prod_min_32_chars}

app:
  jwt:
    secret: ${JWT_SECRET:devmastery_dev_jwt_secret_change_in_prod_min_32_chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24 hours

# ─── SpringDoc OpenAPI ───────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: DevMastery Auth Service
    description: "Authentication and user management API"
    version: "1.0.0"

# ─── Actuator ────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ─── Logging ─────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.devmastery: DEBUG
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# ─── Dev Profile ─────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
