# ─────────────────────────────────────────────────────────────
# DevMastery Core — base configuration
# Overridable per environment via application-{dev,prod}.yml
# ─────────────────────────────────────────────────────────────
spring:
  application:
    name: devmastery-core
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  main:
    lazy-initialization: true          # Faster cold start on Render free tier

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:aws-1-ap-southeast-2.pooler.supabase.com}:${POSTGRES_PORT:5432}/${POSTGRES_DB:postgres}
    username: ${POSTGRES_USER:postgres.diculkpsidcofmbyeqdq}
    password: ${POSTGRES_PASSWORD:#Devmastery@098}
    hikari:
      maximum-pool-size: 3             # Supabase free tier connection limit
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 60000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: caffeine
    cache-names:
      - topicsList
      - topicById
      - topicBySlug
      - lessonsByTopic
      - searchResults
      - userProgress
      - pathsList
    caffeine:
      spec: maximumSize=2000,expireAfterWrite=10m

  servlet:
    multipart:
      max-file-size: 200KB
      max-request-size: 200KB

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always             # Shows DB status in /actuator/health

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# ─── App-specific ─────────────────────────────────────────────
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

  jwt:
    secret: ${JWT_SECRET}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}     # 24h

  storage:
    supabase:
      url:              ${SUPABASE_URL}
      service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}

  ai:
    gemini:
      api-key: ${GEMINI_API_KEY}
      model:   ${GEMINI_MODEL:gemini-2.5-flash}

  # External "Try Online" runner URLs per language ({code} = url-encoded source)
  # These are fallback defaults — admin can override via DB runner_templates table
  runners:
    java:       "https://onecompiler.com/java"
    javascript: "https://jsfiddle.net"
    python:     "https://www.programiz.com/python-programming/online-compiler/"
    kotlin:     "https://play.kotlinlang.org"
    sql:        "https://sqliteonline.com"
    default:    "https://onecompiler.com/"
