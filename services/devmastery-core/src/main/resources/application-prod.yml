# Production — Render free tier + Supabase + Cloudflare R2.
# All values resolved from environment variables (see .env.example).
server:
  forward-headers-strategy: framework
  tomcat:
    threads:
      max: 50                 # Render free instance has limited CPU
      min-spare: 5

logging:
  level:
    root: INFO
    com.devmastery: INFO

spring:
  jpa:
    properties:
      hibernate.format_sql: false
