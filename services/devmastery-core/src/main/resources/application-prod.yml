# Production — Render free tier + Supabase + Cloudflare R2.
# All values resolved from environment variables (see .env.example).
server:
  forward-headers-strategy: framework
  tomcat:
    threads:
      max: 50                 # Render free instance has limited CPU
      min-spare: 5

logging:
  level:
    root: INFO
    com.devmastery: INFO

spring:
  jpa:
    properties:
      hibernate.format_sql: false

  # ─── Flyway tolerance ────────────────────────────────────────
  # The Supabase database was migrated by external/legacy tooling: it
  # already contains versions 1-26 with checksums that don't match the
  # SQL files in this repository (and 19 versions that don't even exist
  # in this repository). Strict validation would refuse to start.
  #
  # `validate-on-migrate: false` — skip the checksum/missing checks.
  # `out-of-order: true`         — let us add new V27, V28… on top.
  # The migrations themselves are unchanged; Flyway will only *apply*
  # versions newer than the latest applied one.
  flyway:
    validate-on-migrate: false
    out-of-order: true
    baseline-on-migrate: true
    baseline-version: 0

