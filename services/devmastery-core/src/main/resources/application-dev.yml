# Local development overrides
# NOTE: Local dev now points directly at Supabase (no local Docker Postgres required).
# Override POSTGRES_* / DATABASE_* env vars if you want to target a different DB.
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${POSTGRES_HOST:aws-1-ap-southeast-2.pooler.supabase.com}:${POSTGRES_PORT:5432}/${POSTGRES_DB:postgres}}
    username: ${DATABASE_USERNAME:${POSTGRES_USER:postgres.diculkpsidcofmbyeqdq}}
    password: ${DATABASE_PASSWORD:${POSTGRES_PASSWORD:}}
  main:
    lazy-initialization: false         # Faster iteration: catch errors early

  flyway:
    # Supabase already has legacy migrations applied — tolerate checksum / missing drift.
    validate-on-migrate: false
    out-of-order: true
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    properties:
      hibernate.format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    com.devmastery: debug

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-min-32-chars-please-aaaaaaaa}
  storage:
    supabase:
      url: ${SUPABASE_URL:http://localhost:54321}
      service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:dev-service-role-key}
