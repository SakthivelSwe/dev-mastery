# Local development overrides
spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:devmastery}
    username: ${POSTGRES_USER:devmastery}
    password: ${POSTGRES_PASSWORD:devmastery_dev_secret}
  main:
    lazy-initialization: false         # Faster iteration: catch errors early

  flyway:
    # Tolerate checksum drift in dev (migrations get edited while iterating).
    validate-on-migrate: false
    out-of-order: true

  jpa:
    properties:
      hibernate.format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    com.devmastery: debug

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-min-32-chars-please-aaaaaaaa}
  storage:
    supabase:
      url: ${SUPABASE_URL:http://localhost:54321}
      service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:dev-service-role-key}
