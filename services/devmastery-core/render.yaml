# =============================================================
# Render.com Blueprint — DevMastery Core (Modular Monolith)
# Deploys as a single Docker web service on the FREE tier.
# NO credit card required.
# Database: Supabase PostgreSQL (free, external)
# Storage: Supabase Storage (free, external)
# =============================================================
services:
  - type: web
    name: devmastery-core
    runtime: docker
    plan: free                                # 512 MB RAM, spins down after 15 min idle
    region: oregon
    rootDir: services/devmastery-core
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"
      # ─── Supabase PostgreSQL ────────────────────────────
      - key: DATABASE_URL
        sync: false       # Set in Render dashboard
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      # ─── Supabase Storage ───────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # ─── JWT ────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY_MS
        value: "86400000"
      # ─── Gemini ─────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      # ─── CORS ───────────────────────────────────────────
      - key: ALLOWED_ORIGINS
        sync: false       # e.g. https://devmastery.pages.dev
