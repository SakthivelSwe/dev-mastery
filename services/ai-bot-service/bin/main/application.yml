server:
  port: ${PORT:8084}

spring:
  application:
    name: ai-bot-service

  # ─── Cache (Valkey / Redis — optional in dev) ─────────────────
  cache:
    type: none  # Set to 'redis' in prod when Valkey is available

  # ─── Database (R2DBC PostgreSQL) ──────────────────────────────
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:devmastery_ai}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    pool:
      max-size: 10
      initial-size: 2
      max-life-time: 10m

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  # ─── Jackson ──────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ─── Service URLs ─────────────────────────────────────────────
content-service:
  url: ${CONTENT_SERVICE_URL:http://localhost:8082}

# ─── Gemini AI ────────────────────────────────────────────────
gemini:
  api-key: ${GEMINI_API_KEY:AIzaSyBaFpoBlUJrehtG6F8NIHm1OqkGDApsO7w}

# ─── Security ─────────────────────────────────────────────────
devmastery:
  security:
    jwt-secret: ${JWT_SECRET:devmastery_dev_jwt_secret_change_in_prod_min_32_chars}

# ─── SpringDoc OpenAPI ────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ─── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ─── Logging ──────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.devmastery: DEBUG
    org.springframework.web.reactive: WARN
  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{30} - %msg%n"

---
# ─── Dev Profile ──────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.devmastery: DEBUG
    org.springframework.web.reactive.function.client: TRACE
