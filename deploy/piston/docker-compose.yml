version: "3.8"

# Local Piston sandbox for DevMastery development.
# Run: docker compose up -d
# Then: docker compose exec piston ppman install java=15.0.2 python=3.10.0
# Point apps/web/.env.local at:  PISTON_URL=http://localhost:2000

services:
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: devmastery-piston
    restart: unless-stopped
    privileged: true
    ports:
      - "2000:2000"
    volumes:
      - piston_data:/piston/packages
    environment:
      PISTON_LOG_LEVEL: INFO
      PISTON_BIND_ADDRESS: 0.0.0.0:2000

volumes:
  piston_data:

