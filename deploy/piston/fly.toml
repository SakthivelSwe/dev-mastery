# Fly.io config for self-hosted Piston code-execution sandbox.
# Deploy: fly launch --copy-config --no-deploy && fly deploy
# See deploy/piston/README.md for the full walkthrough.

app = "devmastery-piston"
primary_region = "iad"   # change to your closest region

[build]
  image = "ghcr.io/engineer-man/piston:latest"

[env]
  PISTON_BIND_ADDRESS = "0.0.0.0:2000"
  PISTON_LOG_LEVEL    = "INFO"
  PISTON_DATA_DIRECTORY = "/piston"
  # Sensible resource caps for the free tier
  PISTON_RUN_MEMORY_LIMIT     = "268435456"   # 256 MB
  PISTON_COMPILE_MEMORY_LIMIT = "536870912"   # 512 MB
  PISTON_COMPILE_TIMEOUT      = "15000"       # 15 s
  PISTON_RUN_TIMEOUT          = "10000"       # 10 s

[[mounts]]
  source      = "piston_data"
  destination = "/piston/packages"

[http_service]
  internal_port = 2000
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period  = "10s"
    interval      = "30s"
    method        = "GET"
    timeout       = "5s"
    path          = "/api/v2/runtimes"

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory_mb = 512

