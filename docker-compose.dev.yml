# =============================================================
# DevMastery — Local dev infrastructure (modular monolith)
#
# Only ONE service: PostgreSQL 16 (matches Supabase in prod).
# Everything else (cache, search, queue, secrets, storage, AI)
# is collapsed into the monolith or moved to managed free tiers.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
# =============================================================
services:

  postgres:
    image: postgres:16-alpine
    container_name: devmastery-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: devmastery
      POSTGRES_USER: devmastery
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devmastery_dev_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devmastery -d devmastery"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
    name: devmastery-postgres-data
