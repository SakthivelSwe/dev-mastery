# =============================================================
# DevMastery — Android Release Build
#
# ROOT CAUSE OF "Tag number over 30 is not supported":
#   JDK 17+ generates PKCS12 with SHA-256 MAC by default.
#   Android Gradle Plugin uses an older BouncyCastle that
#   can't parse the new long-form OID encoding. FIX: use
#   openssl to convert to legacy PKCS12 format in CI.
#
# Required GitHub Secrets:
#   SIGNING_KEY_STORE_BASE64   — base64 of your .p12 keystore
#   SIGNING_STORE_PASSWORD     — keystore password (devmastery123)
#   SIGNING_KEY_ALIAS          — key alias (devmastery)
#   SIGNING_KEY_PASSWORD       — key password (devmastery123)
# =============================================================
name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: ./apps/android

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ─────────────────────────────────────────────────────────
      # KEYSTORE FIX: JDK 17+ PKCS12 uses SHA-256 MAC with
      # long-form OID tags that AGP's BouncyCastle can't read.
      # We decode the stored keystore, then convert it to the
      # "legacy" PKCS12 format using OpenSSL 3 (ubuntu-latest).
      # ─────────────────────────────────────────────────────────
      - name: Decode and convert keystore to AGP-compatible format
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          STOREPASS: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          # Decode stored keystore
          echo "$KEYSTORE_B64" | base64 --decode > devmastery_orig.p12
          echo "Original keystore:"
          file devmastery_orig.p12

          # Convert to legacy PKCS12 that AGP's BouncyCastle can read.
          # -legacy forces RC2/RC4 + SHA1 MAC (old encoding, short-form OIDs).
          openssl pkcs12 \
            -in devmastery_orig.p12 \
            -passin pass:${STOREPASS} \
            -out devmastery.p12 \
            -passout pass:${STOREPASS} \
            -legacy
          echo "Converted keystore:"
          file devmastery.p12

          echo "SIGNING_STORE_FILE=$(pwd)/devmastery.p12" >> $GITHUB_ENV
          rm devmastery_orig.p12

      - name: Build Release APK
        env:
          SIGNING_STORE_FILE: ${{ env.SIGNING_STORE_FILE }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: devmastery-release-${{ github.sha }}
          path: apps/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/android/app/build/outputs/apk/release/app-release.apk
          name: DevMastery ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
