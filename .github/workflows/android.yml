name: Android APK

# Builds the native (Kotlin/Compose) Android app whenever the app changes on main,
# or on manual dispatch. Produces downloadable debug and release APKs as workflow
# artifacts, and automatically updates the "latest" release on GitHub.
#
# Release signing is handled by Gradle itself (see apps/android/app/build.gradle.kts,
# signingConfigs "release"), which reads these environment variables:
#   SIGNING_STORE_FILE, SIGNING_STORE_PASSWORD, SIGNING_KEY_ALIAS, SIGNING_KEY_PASSWORD
# The PKCS12 (.p12) keystore is decoded at build time from the
# SIGNING_KEY_STORE_BASE64 secret — no external signing action needed.

on:
  push:
    branches: [main]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/android/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: |
            apps/android/gradle/libs.versions.toml
            apps/android/settings.gradle.kts
            apps/android/**/build.gradle.kts

      - name: Set up Android SDK (platform 36, build-tools 36)
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Decode release keystore
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
        run: echo "$SIGNING_KEY_STORE_BASE64" | base64 --decode > "$RUNNER_TEMP/devmastery.p12"

      - name: Build Release APK (signed)
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/devmastery.p12
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: devmastery-debug-apk
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: devmastery-release-apk
          path: apps/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Update Latest Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          name: Latest Build
          tag_name: latest
          make_latest: true
          files: |
            apps/android/app/build/outputs/apk/debug/app-debug.apk
            apps/android/app/build/outputs/apk/release/app-release.apk


