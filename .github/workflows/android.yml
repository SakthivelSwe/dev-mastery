name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew execute permission
        run: chmod +x apps/android/gradlew

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/android/**/*.gradle.kts', 'apps/android/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Android Lint (Security & Bug Scan)
        working-directory: apps/android
        run: ./gradlew lintRelease --no-daemon

      - name: Run unit tests
        working-directory: apps/android
        run: ./gradlew test --no-daemon

      - name: Assemble Debug APK
        working-directory: apps/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Assemble Release APK
        working-directory: apps/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: devmastery-debug-${{ github.sha }}
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Move Latest Tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -f latest
          git push origin latest --force

      - name: Update Latest Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Rolling Build"
          body: "This release automatically updates on every commit to main to always contain the latest APKs."
          files: |
            apps/android/app/build/outputs/apk/debug/app-debug.apk
            apps/android/app/build/outputs/apk/release/app-release.apk
