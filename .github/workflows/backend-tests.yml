name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'services/devmastery-core/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/devmastery-core/**'
      - '.github/workflows/backend-tests.yml'
  workflow_dispatch:

jobs:
  test:
    name: Gradle test (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/devmastery-core
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('services/devmastery-core/**/*.gradle*', 'services/devmastery-core/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute on gradlew
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: junit-reports
          path: services/devmastery-core/build/reports/tests/test
          retention-days: 14

