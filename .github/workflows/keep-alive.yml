# =============================================================
# DevMastery — Self-hosted Keep-Alive
#
# GitHub Actions cron pings the Render backend every 13 minutes
# to prevent free-tier spin-down AND keep Supabase active.
# No UptimeRobot or any third-party service needed.
# =============================================================
name: Keep Alive — Render Backend

on:
  schedule:
    - cron: '*/13 * * * *'   # Every 13 minutes (GitHub Actions minimum is 5 min)
  workflow_dispatch:           # Manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping backend health endpoint
        run: |
          echo "Pinging Render backend at $(date -u)..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://devmastery-core.onrender.com/actuator/health)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend is UP"
          else
            echo "⚠️  Backend returned $STATUS — may be waking up (this is normal)"
          fi

      - name: Ping warmup endpoint (keeps Supabase DB active)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://devmastery-core.onrender.com/api/warmup)
          echo "Warmup HTTP Status: $STATUS"
