# =============================================================
# DevMastery — Frontend Deploy (Cloudflare Pages via Wrangler)
#
# ROOT CAUSE of 25MB error:
#   Cloudflare Pages validates ALL files in the output directory.
#   Next.js webpack cache (cache/webpack/**/*.pack) can be 80-150MB.
#   FIX: Delete .next/cache THEN use wrangler to deploy only
#        .next/static + public as static assets.
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN    — cfut_lcjytoTiy...257c (from Cloudflare profile)
#   CLOUDFLARE_ACCOUNT_ID   — a834df18f2c05752c5590e5d26a4be2d
#   NEXT_PUBLIC_API_URL     — https://devmastery-core.onrender.com
#   NEXT_PUBLIC_APP_URL     — https://dev-mastery.pages.dev
# =============================================================
name: Deploy Frontend — Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root workspace dependencies
        run: npm ci

      - name: Install web app dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build Next.js app
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      # ─────────────────────────────────────────────────────────
      # CRITICAL: Remove webpack cache BEFORE Cloudflare validates.
      # .next/cache/webpack/*/0.pack files are 80-150MB each.
      # Cloudflare Pages rejects any file > 25MB.
      # ─────────────────────────────────────────────────────────
      - name: Remove webpack cache (fixes Cloudflare 25MB limit)
        working-directory: apps/web
        run: |
          du -sh .next/cache/ 2>/dev/null && echo "↑ cache size to be removed"
          rm -rf .next/cache
          echo "✅ Cache removed. Final output size: $(du -sh .next/ | cut -f1)"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: dev-mastery
          directory: apps/web/.next
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'
