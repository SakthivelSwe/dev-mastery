# =============================================================
# DevMastery — Frontend Deploy (Cloudflare Pages via next-on-pages)
#
# Uses @cloudflare/next-on-pages to properly compile Next.js 15
# (with SSR + API routes) into Cloudflare Workers-compatible
# output in .vercel/output/static/
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN    — cfut_lcjytoTiy...257c
#   CLOUDFLARE_ACCOUNT_ID   — a834df18f2c05752c5590e5d26a4be2d
#   NEXT_PUBLIC_API_URL     — https://devmastery-core.onrender.com/api
#   NEXT_PUBLIC_APP_URL     — https://dev-mastery.pages.dev
# =============================================================
name: Deploy Frontend — Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root workspace dependencies
        run: npm ci --legacy-peer-deps

      - name: Install web app dependencies
        working-directory: apps/web
        run: npm ci --legacy-peer-deps

      - name: Build with next-on-pages
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_TELEMETRY_DISABLED: 1
          NODE_ENV: production
        run: |
          echo "Building Next.js 15 for Cloudflare Pages via next-on-pages..."
          npm run pages:build
          echo "Build complete. Output: $(du -sh .vercel/output/static/ | cut -f1)"

      - name: Verify Cloudflare secrets are present
        run: |
          echo "CLOUDFLARE_API_TOKEN present : ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}"
          echo "CLOUDFLARE_ACCOUNT_ID present: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}"
          echo "CLOUDFLARE_ACCOUNT_ID len    : $(echo -n '${{ secrets.CLOUDFLARE_ACCOUNT_ID }}' | wc -c)"
          echo "CLOUDFLARE_API_TOKEN len     : $(echo -n '${{ secrets.CLOUDFLARE_API_TOKEN }}' | wc -c)"

      - name: List Cloudflare Pages projects (auth probe)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          echo "Probing Cloudflare API with the configured token..."
          curl -sS -o /tmp/verify.json -w "HTTP=%{http_code}\n" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" || true
          cat /tmp/verify.json | head -c 800; echo
          echo "---"
          echo "Listing Pages projects for the configured account..."
          curl -sS -o /tmp/pages.json -w "HTTP=%{http_code}\n" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" || true
          echo "First 1200 bytes of response:"
          head -c 1200 /tmp/pages.json; echo

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy .vercel/output/static --project-name=dev-mastery --branch=main --commit-dirty=true
