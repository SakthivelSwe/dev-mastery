# =============================================================
# DevMastery — Frontend Deploy (Cloudflare Pages)
#
# Triggers on push to main (only when web app files change).
# Fixes the 25MB file limit issue by deleting webpack cache
# before Cloudflare validates the build output.
# =============================================================
name: Deploy Frontend — Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build Next.js app
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: npm run build

      # CRITICAL FIX: Remove webpack cache before Cloudflare validates output.
      # The cache/webpack/server-production/0.pack file is ~84MB which exceeds
      # Cloudflare Pages' 25MB per-file limit.
      - name: Remove webpack cache (Cloudflare 25MB limit fix)
        working-directory: apps/web
        run: |
          echo "Removing webpack cache to comply with Cloudflare Pages 25MB file limit..."
          rm -rf .next/cache
          echo "Cache removed. Build output size:"
          du -sh .next/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: dev-mastery
          directory: apps/web/.next
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
