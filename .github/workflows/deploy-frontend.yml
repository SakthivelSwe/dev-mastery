# =============================================================
# DevMastery — Frontend Deploy (Cloudflare Pages via next-on-pages)
#
# Uses @cloudflare/next-on-pages to properly compile Next.js 15
# (with SSR + API routes) into Cloudflare Workers-compatible
# output in .vercel/output/static/
#
# Required GitHub Secrets:
#   CLOUDFLARE_API_TOKEN    — cfut_lcjytoTiy...257c
#   CLOUDFLARE_ACCOUNT_ID   — a834df18f2c05752c5590e5d26a4be2d
#   NEXT_PUBLIC_API_URL     — https://devmastery-core.onrender.com/api
#   NEXT_PUBLIC_APP_URL     — https://dev-mastery.pages.dev
# =============================================================
name: Deploy Frontend — Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root workspace dependencies
        run: npm ci --legacy-peer-deps

      - name: Install web app dependencies
        working-directory: apps/web
        run: npm ci --legacy-peer-deps

      - name: Build with next-on-pages
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_TELEMETRY_DISABLED: 1
          NODE_ENV: production
        run: |
          echo "Building Next.js 15 for Cloudflare Pages via next-on-pages..."
          npm run pages:build
          echo "Build complete. Output: $(du -sh .vercel/output/static/ | cut -f1)"

      - name: Preflight — Cloudflare secrets must be non-empty
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          tok_len=${#CLOUDFLARE_API_TOKEN}
          acc_len=${#CLOUDFLARE_ACCOUNT_ID}
          echo "::notice::CLOUDFLARE_API_TOKEN length = $tok_len"
          echo "::notice::CLOUDFLARE_ACCOUNT_ID length = $acc_len"
          if [ "$tok_len" -lt 20 ]; then
            echo "::error::CLOUDFLARE_API_TOKEN GitHub secret is missing or empty (length=$tok_len). Add it at https://github.com/SakthivelSwe/dev-mastery/settings/secrets/actions"
            exit 1
          fi
          if [ "$acc_len" -lt 20 ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID GitHub secret is missing or empty (length=$acc_len). Add it at https://github.com/SakthivelSwe/dev-mastery/settings/secrets/actions"
            exit 1
          fi
          # Confirm the token can actually authenticate against Cloudflare.
          http=$(curl -sS -o /tmp/verify.json -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          echo "::notice::/user/tokens/verify HTTP=$http"
          if [ "$http" != "200" ]; then
            body=$(head -c 400 /tmp/verify.json)
            echo "::error::Cloudflare token verify returned HTTP $http. Body: $body"
            exit 1
          fi

      - name: Verify Cloudflare secrets are present
        run: |
          echo "CLOUDFLARE_API_TOKEN present : ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}"
          echo "CLOUDFLARE_ACCOUNT_ID present: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}"

      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set +e
          echo "wrangler version:"
          npx --yes wrangler@3 --version || true
          echo "---"
          echo "Listing existing Pages projects for account $CLOUDFLARE_ACCOUNT_ID..."
          npx --yes wrangler@3 pages project list 2>&1 | tee /tmp/pages-list.txt
          echo "---"
          npx --yes wrangler@3 pages deploy .vercel/output/static \
            --project-name=dev-mastery \
            --branch=main \
            --commit-dirty=true 2>&1 | tee /tmp/deploy.log
          rc=${PIPESTATUS[0]}
          echo "wrangler exit code: $rc"
          if [ "$rc" -ne 0 ]; then
            echo "===== LAST 200 LINES OF DEPLOY LOG ====="
            tail -n 200 /tmp/deploy.log
            # Re-emit last 80 lines as GitHub error annotations so they surface via the API
            echo "::group::deploy-error-annotations"
            tail -n 80 /tmp/deploy.log | while IFS= read -r line; do
              # strip ANSI, %, CR
              clean=$(printf '%s' "$line" | sed -E 's/\x1B\[[0-9;]*[a-zA-Z]//g' | tr -d '\r' | sed 's/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
              [ -n "$clean" ] && echo "::error::wrangler: $clean"
            done
            echo "::endgroup::"
            exit $rc
          fi
