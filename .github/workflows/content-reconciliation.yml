name: Content Reconciliation

# Runs the MDX-vs-DB alignment audit.
#
# Modes:
#   - PRs & pushes: audit-only (no DB writes). Fails if orphans or drift appear.
#   - Nightly cron & workflow_dispatch: same audit; a maintainer can trigger the
#     full reconciler locally with `npm run content:reconcile` if orphans exist.
#
# Secrets required for the audit (read-only DB access):
#   SUPABASE_DB_URL — full pooler connection string (postgresql://…?sslmode=require)

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/content/**'
      - 'scripts/audit-content-vs-db.js'
      - 'scripts/seed-all-topic-paths.js'
      - 'scripts/sync-mdx-titles-to-db.js'
      - 'scripts/normalize-topic-titles.js'
      - 'scripts/fix-broken-mdx-titles.js'
      - 'scripts/reconcile-content.js'
      - '.github/workflows/content-reconciliation.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/content/**'
      - 'scripts/audit-content-vs-db.js'
      - 'scripts/reconcile-content.js'
      - '.github/workflows/content-reconciliation.yml'
  schedule:
    # 03:15 UTC nightly — after Vercel builds, before working hours
    - cron: '15 3 * * *'
  workflow_dispatch:

jobs:
  audit:
    name: MDX ↔ DB alignment audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps (pg only)
        run: npm ci --omit=optional --ignore-scripts

      - name: Run audit
        id: audit
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::warning::SUPABASE_DB_URL secret not set — skipping DB audit"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Route the connection string via env — script currently has a hardcoded
          # fallback we intentionally override.
          node scripts/audit-content-vs-db.js | tee audit.log
          # Fail if orphans found
          if grep -qE 'orphan_mdx=[1-9]|orphan_db=[1-9]' audit.log; then
            echo "::error::Content-vs-DB audit found orphans"
            exit 1
          fi
          if grep -qE 'TOTAL.*title_drift=([1-9][0-9]{2,}|[5-9][0-9])' audit.log; then
            echo "::warning::Title drift > 50 detected. Consider running: npm run content:reconcile"
          fi

      - name: Publish summary
        if: always()
        run: |
          {
            echo "# 🔍 MDX ↔ DB Alignment Audit"
            echo ""
            if [ "${{ steps.audit.outputs.skipped }}" = "true" ]; then
              echo "⚠️  Skipped — SUPABASE_DB_URL secret is not configured."
            elif [ -f audit.log ]; then
              echo '```'
              tail -n 30 audit.log
              echo '```'
              echo ""
              echo "**Fix orphans locally:** \`npm run content:reconcile\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-vs-db-audit
          path: audit.log
          if-no-files-found: ignore
          retention-days: 14

