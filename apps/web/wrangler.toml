name = "dev-mastery"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# ── Build-time environment variables ─────────────────────────────────────
# NEXT_PUBLIC_* vars must be plaintext at build time so Next.js can embed
# them into the client bundle. Secrets set via the dashboard are encrypted
# and NOT available during `next build`, causing process.env.NEXT_PUBLIC_*
# to resolve to undefined → "Failed to fetch".
[vars]
NEXT_PUBLIC_API_URL = "https://devmastery-core.onrender.com"
NEXT_PUBLIC_APP_URL = "https://dev-mastery.pages.dev"
