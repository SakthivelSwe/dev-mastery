name = "dev-mastery"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# ── Keep-alive cron ──────────────────────────────────────────────────────
# Cloudflare calls /api/keepalive every 14 minutes to prevent the Render
# free-tier backend from sleeping (Render spins down after 15 min idle).
[triggers]
crons = ["*/14 * * * *"]

